# Activated on the server via SPRING_PROFILES_ACTIVE=prod (set in the systemd
# env file at /etc/toolbox/msc-shipping-tracking.env). Local dev keeps the
# default H2 wiring in application.properties.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/msc_shipping_tracking?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Use the MySQL-dialect schema explicitly. Spring's default behavior would
# also load the H2 schema.sql (regardless of platform), which fails parsing
# against MySQL (`bigint generated by default as identity`, etc.).
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.sql.init.mode=always
