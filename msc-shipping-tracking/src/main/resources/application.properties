spring.application.name=my-ai-project
spring.datasource.url=jdbc:h2:file:./data/shipping-tracking/shipping-tracking;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

spring.mail.host=smtp.qq.com
spring.mail.port=465
spring.mail.username=${QQ_MAIL_USERNAME:}
spring.mail.password=${QQ_MAIL_AUTH_CODE:}
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Local mail smoke test:
# export QQ_MAIL_USERNAME=your_qq_mail
# export QQ_MAIL_AUTH_CODE=your_qq_mail_auth_code
# export SHIPPING_TRACKING_NOTIFY_EMAILS=recipient@example.com
# mvn spring-boot:run -Dspring-boot.run.arguments="--server.port=18080"
# curl -X POST http://localhost:18080/api/shipping-tracking/test-email
shipping.tracking.notify-emails=${SHIPPING_TRACKING_NOTIFY_EMAILS:}
shipping.tracking.cron=0 0 9 * * *
shipping.tracking.min-requery-hours=20
shipping.tracking.delay-min-seconds=10
shipping.tracking.delay-max-seconds=20
shipping.tracking.screenshots-dir=data/shipping-tracking/screenshots

# Application log (relative to WorkingDirectory). Spring Boot's default logback rolls daily
# and keeps an archive pattern like msc-shipping-tracking.YYYY-MM-DD.0.log next to the active file.
logging.file.name=logs/msc-shipping-tracking.log

# Base64-encoded 32-byte AES key for SMTP credential encryption.
# Mandatory once any v1:-prefixed rows exist; startup will fail otherwise.
shipping.tracking.encryption-key=${SHIPPING_TRACKING_ENCRYPTION_KEY:}
