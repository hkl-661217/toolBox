spring.datasource.url=jdbc:h2:mem:shipping_tracking_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

shipping.tracking.notify-emails=test@example.com
shipping.tracking.delay-min-seconds=0
shipping.tracking.delay-max-seconds=0
shipping.tracking.batch-limit=5

# Keep test runs from writing to the production logs/ directory.
logging.file.name=${java.io.tmpdir}/msc-shipping-tracking-test.log

shipping.tracking.encryption.key=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
