name: Build & Deploy to Aliyun

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build (skip tests)
        run: mvn -B clean package -DskipTests

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy jar + restart service
        run: |
          JAR=$(ls target/*.jar | grep -vE 'sources|javadoc' | head -1)
          echo "Deploying $JAR"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$JAR" "root@${{ secrets.DEPLOY_HOST }}:/opt/toolbox/app.jar.new"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "root@${{ secrets.DEPLOY_HOST }}" '
              set -e
              # 备份当前 jar（保留最近 3 份），不动 models/ 目录
              cp -a /opt/toolbox/app.jar "/opt/toolbox/app.jar.bak-$(date +%Y%m%d-%H%M%S)"
              ls -t /opt/toolbox/app.jar.bak-* 2>/dev/null | tail -n +4 | xargs -r rm -f
              mv /opt/toolbox/app.jar.new /opt/toolbox/app.jar
              systemctl restart toolbox.service
              # 健康检查：最多等 60s
              for i in $(seq 1 30); do
                if [ "$(curl -s -o /dev/null -w %{http_code} http://localhost:8083/)" = "200" ]; then
                  echo "✅ toolbox.service is up"; exit 0
                fi
                sleep 2
              done
              echo "❌ service did not become healthy in time"; systemctl status toolbox.service --no-pager | tail -20; exit 1
            '
